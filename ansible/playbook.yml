- name: set up
  hosts: 127.0.0.1
  connection: local
  gather_facts: no
  become: no

  # Package installs (formulae + casks) are handled by the Brewfile via
  # `brew bundle` in setup.sh. Ansible is only for system configuration.
  roles:
    - keyboard
    - shell
    - starship
    - ghostty
    - node
