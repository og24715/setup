- name: ensure LaunchAgents directory exists
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/Library/LaunchAgents"
    state: directory
    mode: "0755"

- name: install CapsLock -> Control LaunchAgent
  ansible.builtin.copy:
    dest: "{{ lookup('env', 'HOME') }}/Library/LaunchAgents/com.local.keyremap.plist"
    mode: "0644"
    # hidutil mappings do not survive a reboot, so re-apply them at every login.
    # 0x700000039 = Caps Lock, 0x7000000E0 = Left Control.
    content: |
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
      <plist version="1.0">
      <dict>
        <key>Label</key>
        <string>com.local.keyremap</string>
        <key>ProgramArguments</key>
        <array>
          <string>/usr/bin/hidutil</string>
          <string>property</string>
          <string>--set</string>
          <string>{"UserKeyMapping":[{"HIDKeyboardModifierMappingSrc":0x700000039,"HIDKeyboardModifierMappingDst":0x7000000E0}]}</string>
        </array>
        <key>RunAtLoad</key>
        <true/>
      </dict>
      </plist>

- name: apply the remapping immediately
  ansible.builtin.command:
    cmd: >
      /usr/bin/hidutil property --set
      '{"UserKeyMapping":[{"HIDKeyboardModifierMappingSrc":0x700000039,"HIDKeyboardModifierMappingDst":0x7000000E0}]}'
  changed_when: true
