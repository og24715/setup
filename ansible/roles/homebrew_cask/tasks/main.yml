- name: install homebrew cask packages
  community.general.homebrew_cask:
    name:
      - raycast
      - docker
      - google-chrome
      - google-japanese-ime
      - iterm2
      - visual-studio-code
      - gather
      - slack
    # Provided when the playbook is run with --ask-become-pass, so pkg-based
    # casks such as google-japanese-ime can install. Omitted otherwise.
    sudo_password: "{{ ansible_become_password | default(omit) }}"