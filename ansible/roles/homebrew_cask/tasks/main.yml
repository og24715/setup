- name: install homebrew cask packages
  community.general.homebrew_cask:
    name:
      - raycast
      - docker
      - google-chrome
      - google-japanese-ime
      - iterm2
      - visual-studio-code
      - gather
      - slack
    # From the vars_prompt in playbook.yml. homebrew_cask sets SUDO_ASKPASS
    # from this, which lets brew run `sudo -A` for casks that need root
    # (docker's symlink into /usr/local/bin, the google-japanese-ime pkg, ...).
    sudo_password: "{{ become_password }}"