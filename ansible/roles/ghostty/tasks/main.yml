# Ghostty terminal config. The Ghostty app is installed via the Brewfile.
- name: ensure ghostty config directory exists
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.config/ghostty"
    state: directory
    mode: "0755"

- name: install the ghostty config
  ansible.builtin.copy:
    src: config
    dest: "{{ lookup('env', 'HOME') }}/.config/ghostty/config"
    mode: "0644"
