# Starship prompt. The `starship` binary is installed via the Brewfile.
- name: ensure fish config directory exists
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.config/fish"
    state: directory
    mode: "0755"

- name: enable starship in fish
  ansible.builtin.lineinfile:
    path: "{{ lookup('env', 'HOME') }}/.config/fish/config.fish"
    line: "starship init fish | source"
    create: true
    mode: "0644"

- name: install the starship config
  ansible.builtin.copy:
    src: starship.toml
    dest: "{{ lookup('env', 'HOME') }}/.config/starship.toml"
    mode: "0644"
